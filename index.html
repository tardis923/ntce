<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考官编排管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #3498db;
            flex-shrink: 0;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .description {
            color: #7f8c8d;
            font-size: 14px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            max-width: 1800px;
            margin: 0 auto;
            gap: 20px;
            width: 100%;
            overflow: hidden;
        }
        
        /* 左侧已编排考官面板 */
        .assigned-panel {
            width: 280px;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .assigned-panel-header {
            flex-shrink: 0;
        }
        
        .assigned-panel-title {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .control-section {
            margin-bottom: 20px;
        }
        
        .control-label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }
        
        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        .assigned-examiner-list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
        }
        
        .assigned-examiner-item {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .assigned-examiner-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .assigned-examiner-details {
            font-size: 12px;
            color: #7f8c8d;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        /* ✅ 折叠面板 */
        .collapsible-section {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .collapsible-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f0f4f8;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        
        .collapsible-header:hover {
            background-color: #e3f2fd;
        }
        
        .arrow {
            transition: transform 0.2s;
        }
        
        .collapsible-content {
            padding: 10px;
            background: #fafafa;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px dashed #eee;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-area {
            color: #333;
        }
        
        .stat-numbers {
            color: #666;
            font-size: 12px;
        }
        
        /* 中央区域 */
        .arrangement-area {
            flex: 1;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .arrangement-header {
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .control-buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .btn-small {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .btn-small:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
        }
        
        .btn-import { background-color: #2ecc71; }
        .btn-import:hover { background-color: #27ae60; }
        .btn-export { background-color: #9b59b6; }
        .btn-export:hover { background-color: #8e44ad; }
        .btn-clear { background-color: #e74c3c; }
        .btn-clear:hover { background-color: #c0392b; }
        .btn-preview { background-color: #f39c12; }
        .btn-preview:hover { background-color: #d68910; }
        .btn-restore { background-color: #1abc9c; }
        .btn-restore:hover { background-color: #16a085; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        
        .auto-save-status {
            font-size: 12px;
            color: #7f8c8d;
            margin-left: 10px;
            display: flex;
            align-items: center;
        }
        
        .auto-save-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #2ecc71;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        .auto-save-dot.inactive {
            background-color: #e74c3c;
            animation: none;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .file-input-hidden { display: none; }
        
        .arrangement-table-container {
            flex: 1;
            overflow: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .table-fixed-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #2c3e50;
        }
        
        .exam-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }
        
        .exam-table th {
            background-color: #2c3e50;
            color: white;
            font-weight: 600;
            text-align: center;
            padding: 12px 8px;
            border-right: 1px solid #3a506b;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .exam-table th:first-child { border-top-left-radius: 8px; }
        .exam-table th:last-child { border-top-right-radius: 8px; border-right: none; }
        
        .exam-table td {
            padding: 10px 8px;
            border: 1px solid #e0e0e0;
            text-align: center;
            min-height: 60px;
            vertical-align: middle;
        }
        
        .col-room { width: 80px; background-color: #f8f9fa; font-weight: 600; }
        .col-count { width: 150px; background-color: #f8f9fa; }
        .col-teacher { width: 140px; }
        .col-subject { width: 120px; }
        
        .teacher-drop-zone {
            min-height: 60px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px;
            position: relative;
        }
        
        .teacher-drop-zone:hover {
            border-color: #3498db;
            background-color: #f0f8ff;
        }
        
        .teacher-drop-zone.filled {
            border-style: solid;
            border-color: #d5e8f4;
            background-color: #f0f8ff;
            color: #333;
            cursor: move;
        }
        
        .teacher-info { width: 100%; }
        .teacher-name { font-weight: 600; color: #2c3e50; font-size: 14px; margin-bottom: 4px; }
        .teacher-school { font-size: 12px; color: #3498db; font-weight: 600; display: inline-block; padding: 2px 8px; background-color: #e8f4fc; border-radius: 10px; }
        
        .teacher-delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        .teacher-drop-zone.filled:hover .teacher-delete-btn { display: flex; }
        
        /* 右侧考官面板 */
        .examiner-panel {
            width: 300px;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header { flex-shrink: 0; }
        .panel-title {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .search-box { position: relative; }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #7f8c8d; }
        
        .examiner-list-container { flex: 1; overflow-y: auto; margin-top: 10px; }
        
        .examiner-item {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: move;
            transition: all 0.2s;
            position: relative;
        }
        
        .examiner-item.assigned { background-color: #e8f5e9; border-color: #c8e6c9; }
        .examiner-item.disabled { background-color: #ffebee; border-color: #ffcdd2; cursor: not-allowed; }
        
        .examiner-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .examiner-name { font-weight: 600; color: #2c3e50; font-size: 14px; }
        .examiner-subject-badge { display: inline-block; background-color: #e8f4fc; color: #3498db; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .examiner-details { font-size: 12px; color: #7f8c8d; display: flex; flex-direction: column; gap: 2px; }
        
        .examiner-toggle-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        .examiner-toggle-btn.disable-btn { background-color: #e74c3c; color: white; }
        .examiner-toggle-btn.enable-btn { background-color: #2ecc71; color: white; }
        
        .assigned-filter { display: flex; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ecf0f1; }
        .filter-label { font-size: 14px; color: #34495e; margin-right: 10px; }
        .filter-checkbox { width: auto; margin-right: 5px; }
        
        .status-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .drop-zone-hover { border-color: #3498db !important; background-color: #e3f2fd !important; }
        .row-drop-zone-hover { background-color: #e3f2fd !important; }
        
        .no-data-msg { text-align: center; color: #7f8c8d; padding: 40px 20px; font-size: 16px; }
        .no-data-msg .icon { font-size: 48px; margin-bottom: 15px; color: #bdc3c7; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .modal-title { font-size: 18px; color: #2c3e50; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #7f8c8d; }
        
        @media (max-width: 1400px) {
            .main-container { flex-direction: column; height: auto; }
            .assigned-panel, .examiner-panel { width: 100%; max-height: 400px; }
        }
        
        @media (max-width: 768px) {
            .control-buttons-container { flex-direction: column; }
            .btn-group { width: 100%; }
            .btn-small { flex: 1; min-width: 120px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>考官编排管理系统</h1>
        <p class="description">导入考官信息和学科人数数据，通过拖拽方式编排考官到8列表格中</p>
    </header>
    
    <div class="main-container">
        <!-- 左侧已编排考官面板 -->
        <div class="assigned-panel">
            <div class="assigned-panel-header">
                <div class="assigned-panel-title">
                    <span>已编排考官</span>
                </div>
                
                <!-- ✅ 折叠统计 -->
                <div class="collapsible-section">
                    <div class="collapsible-header" onclick="toggleAreaStats()">
                        <span>📊 县区已编排统计</span>
                        <span class="arrow" id="area-stats-arrow">▼</span>
                    </div>
                    <div class="collapsible-content" id="area-stats-content"></div>
                </div>
                
                <div class="control-section">
                    <label class="control-label">按县区筛选</label>
                    <select id="area-filter"><option value="all">全部县区</option></select>
                </div>
                
                <div class="control-section">
                    <label class="control-label">按工作单位筛选</label>
                    <select id="school-filter"><option value="all">全部单位</option></select>
                </div>
            </div>
            
            <div class="assigned-examiner-list-container">
                <div class="assigned-examiner-list" id="assigned-examiner-list">
                    <div class="no-data-msg"><div class="icon">👤</div><div>暂无已编排考官</div></div>
                </div>
            </div>
        </div>
        
        <!-- 中央编排区域 -->
        <div class="arrangement-area">
            <div class="arrangement-header">
                <div class="control-buttons-container">
                    <div class="btn-group">
                        <button id="import-examiners" class="btn-small btn-import">导入考官数据</button>
                        <button id="import-subject-counts" class="btn-small btn-import">导入学科人数</button>
                        <button id="clear-examiners" class="btn-small btn-danger">清空考官信息库</button>
                        <button id="clear-subject-counts" class="btn-small btn-danger">清空学科人数</button>
                        <button id="preview-export" class="btn-small btn-preview">导出前预览</button>
                        <button id="backup-data" class="btn-small">备份数据</button>
                        <button id="restore-data" class="btn-small btn-restore">还原备份</button>
                        <button id="clear-all" class="btn-small btn-clear">清空所有编排</button>
                    </div>
                    
                    <div class="btn-group">
                        <button id="export-csv" class="btn-small btn-export">导出编排表 (CSV)</button>
                        <button id="export-xlsx" class="btn-small btn-export">导出编排表 (XLSX)</button>
                        <button id="export-txt" class="btn-small btn-export">导出编排表 (TXT)</button>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="exam-room-control" style="display: flex; align-items: center; gap: 10px;">
                        <label style="font-weight: 600;">考场数量：</label>
                        <input type="number" id="room-count" style="width: 80px; padding: 8px;" min="1" max="100" value="68">
                        <button id="update-rooms" class="btn-small">更新考场</button>
                    </div>
                    
                    <div class="auto-save-status" id="auto-save-status">
                        <span class="auto-save-dot inactive" id="auto-save-dot"></span>
                        <span id="auto-save-text">自动保存已禁用</span>
                    </div>
                </div>
            </div>
            
            <div class="arrangement-table-container">
                <table class="exam-table" id="exam-table">
                    <thead class="table-fixed-header">
                        <tr>
                            <th class="col-room">考场号</th>
                            <th class="col-count">学科人数</th>
                            <th class="col-teacher">教师姓名1</th>
                            <th class="col-subject">学科1</th>
                            <th class="col-teacher">教师姓名2</th>
                            <th class="col-subject">学科2</th>
                            <th class="col-teacher">教师姓名3</th>
                            <th class="col-subject">学科3</th>
                        </tr>
                    </thead>
                    <tbody id="exam-table-body"></tbody>
                </table>
            </div>
        </div>
        
        <!-- 右侧考官信息面板 -->
        <div class="examiner-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span>考官信息库</span>
                    <span id="examiner-count">0 位</span>
                </div>
                <!-- ✅ 保留：学科关键字搜索 -->
                <div class="control-section">
                    <label class="control-label">搜索学科关键字</label>
                    <div class="search-box">
                        <input type="text" id="subject-keyword-search" placeholder="如：音、体、英...">
                        <span class="search-icon">🔍</span>
                    </div>
                </div>
                
                <div class="control-section">
                    <label class="control-label">搜索考官姓名</label>
                    <div class="search-box">
                        <input type="text" id="name-search" placeholder="输入考官姓名...">
                        <span class="search-icon">🔍</span>
                    </div>
                </div>
                
                <div class="assigned-filter">
                    <label class="filter-label">
                        <input type="checkbox" id="hide-assigned" class="filter-checkbox">
                        隐藏已编排考官
                    </label>
                </div>
                
                <div class="status-info">
                    <span id="unassigned-count">未分配: 0</span>
                    <span id="assigned-count">已分配: 0</span>
                </div>
            </div>
            
            <div class="examiner-list-container">
                <div class="examiner-list" id="examiner-list">
                    <div class="no-data-msg"><div class="icon">👤</div><div>请导入考官数据</div></div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input-examiners" class="file-input-hidden" accept=".txt">
    <input type="file" id="file-input-subject-counts" class="file-input-hidden" accept=".txt">
    <input type="file" id="file-input-restore" class="file-input-hidden" accept=".json">

    <div id="preview-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">导出预览</h3>
                <button class="modal-close" id="close-preview">×</button>
            </div>
            <div id="preview-content"></div>
        </div>
    </div>
<script>
        let examiners = [];
        let examRooms = [];
        let subjectCounts = {};
        let currentRoomCount = 68;
        let nextExaminerId = 1;
        let autoSaveEnabled = false;
        let isDataModified = false;
        let lastBackupData = null;

        // DOM 元素
        const fileInputExaminers = document.getElementById('file-input-examiners');
        const fileInputSubjectCounts = document.getElementById('file-input-subject-counts');
        const fileInputRestore = document.getElementById('file-input-restore');
        const importExaminersBtn = document.getElementById('import-examiners');
        const importSubjectCountsBtn = document.getElementById('import-subject-counts');
        const backupDataBtn = document.getElementById('backup-data');
        const restoreDataBtn = document.getElementById('restore-data');
        const clearExaminersBtn = document.getElementById('clear-examiners');
        const clearSubjectCountsBtn = document.getElementById('clear-subject-counts');
        const exportCsvBtn = document.getElementById('export-csv');
        const exportXlsxBtn = document.getElementById('export-xlsx');
        const exportTxtBtn = document.getElementById('export-txt');
        const previewExportBtn = document.getElementById('preview-export');
        const clearAllBtn = document.getElementById('clear-all');
        const roomCountInput = document.getElementById('room-count');
        const updateRoomsBtn = document.getElementById('update-rooms');
        // const subjectFilter = document.getElementById('subject-filter'); // ✅ 已删除
        const nameSearch = document.getElementById('name-search');
        const hideAssignedCheckbox = document.getElementById('hide-assigned');
        const areaFilter = document.getElementById('area-filter');
        const schoolFilter = document.getElementById('school-filter');
        const examinerList = document.getElementById('examiner-list');
        const assignedExaminerList = document.getElementById('assigned-examiner-list');
        const examinerCount = document.getElementById('examiner-count');
        const unassignedCount = document.getElementById('unassigned-count');
        const assignedCount = document.getElementById('assigned-count');
        const examTableBody = document.getElementById('exam-table-body');
        const previewModal = document.getElementById('preview-modal');
        const closePreviewBtn = document.getElementById('close-preview');
        const previewContent = document.getElementById('preview-content');
        const autoSaveStatus = document.getElementById('auto-save-status');
        const autoSaveDot = document.getElementById('auto-save-dot');
        const autoSaveText = document.getElementById('auto-save-text');
        const subjectKeywordSearch = document.getElementById('subject-keyword-search');

        // ✅ 统一刷新入口
        function refreshAllUI() {
            updateExamTable();
            updateExaminerList();
            updateAssignedExaminerList();
            updateAssignedAreaStatistics();
        }

        function toggleAreaStats() {
            const content = document.getElementById('area-stats-content');
            const arrow = document.getElementById('area-stats-arrow');
            if (!content || !arrow) return;

            if (content.style.display === 'none') {
                content.style.display = 'block';
                arrow.textContent = '▼';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'none';
                arrow.textContent = '▶';
                arrow.style.transform = 'rotate(-90deg)';
            }
        }

        // ✅ 修复：按单位归属统计县区
        function updateAssignedAreaStatistics() {
            const container = document.getElementById('area-stats-content');
            if (!container) return;

            const areaRules = [
                { name: '珠山区', keyword: '珠山区' },
                { name: '昌江区', keyword: '昌江区' },
                { name: '浮梁县', keyword: '浮梁县' },
                { name: '乐平', keyword: '乐平' }
            ];

            const assigned = examiners.filter(e => e.assigned);

            let html = '';
            areaRules.forEach(rule => {
                const list = assigned.filter(e => e.school && e.school.includes(rule.keyword));
                const total = list.length;
                const male = list.filter(e => e.gender === '男').length;
                const female = list.filter(e => e.gender === '女').length;

                html += `
                    <div class="stat-row">
                        <span class="stat-area">${rule.name}</span>
                        <span class="stat-numbers">
                            合计：${total}
                            <span style="color:#3498db;">(男：${male}</span> /
                            <span style="color:#e91e63;">女：${female})</span>
                        </span>
                    </div>
                `;
            });

            container.innerHTML = html || '<div class="stat-row">暂无数据</div>';
        }

        function parseExaminerFile(content) {
            const lines = content.split('\n');
            const newExaminers = [];
            
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                
                const parts = line.split(/\t| {2,}/);
                if (parts.length >= 6) {
                    const examiner = {
                        id: nextExaminerId++,
                        name: parts[0] || "",
                        school: parts[1] || "",
                        subject: parts[2] || "",
                        phone: parts[3] || "",
                        period: parts[4] || "",
                        gender: parts[5] || "",
                        assigned: false,
                        disabled: false,
                        assignedRoom: null,
                        area: extractAreaFromSchool(parts[1] || "")
                    };
                    newExaminers.push(examiner);
                }
            });
            
            return newExaminers;
        }
        
        function extractAreaFromSchool(school) {
            if (!school) return "未知";
            const keywords = ["景德镇市", "珠山区", "昌江区", "浮梁县", "乐平", "市直", "市属"];
            for (const k of keywords) {
                if (school.includes(k)) {
                    return k.replace("市", "").replace("县", "").replace("区", "");
                }
            }
            return "其他";
        }
        
        function parseSubjectCountsFile(content) {
            const lines = content.split('\n');
            const counts = {};
            
            lines.forEach((line, index) => {
                line = line.trim();
                if (!line) return;
                
                const roomNumber = index + 1;
                const parts = line.split('\t').filter(p => p.trim() !== '');
                
                let roomCounts = [];
                parts.forEach(part => {
                    if (/^\d+$/.test(part.trim())) return;
                    const m = part.match(/(\d+)(.+)/);
                    if (m) {
                        roomCounts.push(`${m[2].trim()}: ${m[1]}人`);
                    }
                });
                
                counts[roomNumber] = roomCounts.join('<br>');
            });
            
            return counts;
        }
        
        function updateAreaFilter() {
            const areas = [...new Set(examiners.map(e => e.area).filter(Boolean))];
            areaFilter.innerHTML = '<option value="all">全部县区</option>';
            areas.sort().forEach(a => {
                const o = document.createElement('option');
                o.value = a;
                o.textContent = a;
                areaFilter.appendChild(o);
            });
        }
        
        function updateSchoolFilter() {
            const schools = [...new Set(examiners.map(e => e.school).filter(s => s && s.includes("景德镇")))];
            schoolFilter.innerHTML = '<option value="all">全部单位</option>';
            if (schools.length === 0) {
                schoolFilter.parentElement.style.display = 'none';
                return;
            }
            schoolFilter.parentElement.style.display = 'block';
            schools.sort().forEach(s => {
                const o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                schoolFilter.appendChild(o);
            });
        }
        
        function findExaminerRoom(examinerId) {
            for (let room of examRooms) {
                for (let i = 0; i < room.examiners.length; i++) {
                    if (room.examiners[i] === examinerId) return room.id;
                }
            }
            return null;
        }
        
        function updateExaminerList() {
            let filtered = examiners;
            
            // ✅ 已删除：subjectFilter 逻辑
            const keyword = subjectKeywordSearch ? subjectKeywordSearch.value.toLowerCase() : '';
            const nameVal = nameSearch.value.toLowerCase();
            const hideAssigned = hideAssignedCheckbox.checked;
            
            if (keyword) {
                filtered = filtered.filter(e => e.subject && e.subject.toLowerCase().includes(keyword));
            }
            
            if (nameVal) {
                filtered = filtered.filter(e => e.name.toLowerCase().includes(nameVal));
            }
            
            if (hideAssigned) {
                filtered = filtered.filter(e => !e.assigned);
            }
            
            const total = examiners.length;
            const assigned = examiners.filter(e => e.assigned).length;
            examinerCount.textContent = `${total} 位`;
            unassignedCount.textContent = `未分配: ${total - assigned}`;
            assignedCount.textContent = `已分配: ${assigned}`;
            
            if (filtered.length === 0) {
                examinerList.innerHTML = '<div class="no-data-msg"><div class="icon">🔍</div><div>没有找到符合条件的考官</div></div>';
                return;
            }
            
            let html = '';
            filtered.forEach(examiner => {
                const roomNumber = findExaminerRoom(examiner.id);
                examiner.assignedRoom = roomNumber;
                
                const assignedClass = examiner.assigned ? 'assigned' : '';
                const disabledClass = examiner.disabled ? 'disabled' : '';
                const toggleClass = examiner.disabled ? 'enable-btn' : 'disable-btn';
                const toggleText = examiner.disabled ? '✓' : '×';
                const roomText = roomNumber ? `考场${roomNumber}` : '';
                
                html += `
                    <div class="examiner-item ${assignedClass} ${disabledClass}" 
                         data-id="${examiner.id}"
                         ondragstart="${examiner.disabled ? '' : 'dragExaminerStart(event)'}"
                         ${examiner.disabled ? '' : 'draggable="true"'}>
                        <button class="examiner-toggle-btn ${toggleClass}" 
                                onclick="toggleExaminerStatus(event, ${examiner.id})">
                            ${toggleText}
                        </button>
                        ${roomText ? `<span class="examiner-room-number">${roomText}</span>` : ''}
                        <div class="examiner-main">
                            <div class="examiner-name">${examiner.name} (${examiner.gender})</div>
                            <div class="examiner-subject-badge">${examiner.subject}</div>
                        </div>
                        <div class="examiner-details">
                            <div>${examiner.school}</div>
                            <div>${examiner.phone} | ${examiner.period}期</div>
                        </div>
                    </div>
                `;
            });
            
            examinerList.innerHTML = html;
        }
        
        function updateAssignedExaminerList() {
            let list = examiners.filter(e => e.assigned);
            
            if (areaFilter.value !== 'all') {
                list = list.filter(e => e.area === areaFilter.value);
            }
            
            if (schoolFilter.value !== 'all') {
                list = list.filter(e => e.school === schoolFilter.value);
            }
            
            if (list.length === 0) {
                assignedExaminerList.innerHTML = '<div class="no-data-msg"><div class="icon">👤</div><div>暂无已编排考官</div></div>';
                updateAssignedAreaStatistics();
                return;
            }
            
            let html = '';
            list.forEach(examiner => {
                html += `
                    <div class="assigned-examiner-item">
                        <div class="assigned-examiner-name">${examiner.name} (${examiner.gender})</div>
                        <div class="assigned-examiner-details">
                            <div>工作单位：${examiner.school}</div>
                            <div>学科：${examiner.subject}</div>
                            <div>联系电话：${examiner.phone}</div>
                        </div>
                    </div>
                `;
            });
            
            assignedExaminerList.innerHTML = html;
            updateAssignedAreaStatistics();
        }
        
        function toggleExaminerStatus(event, examinerId) {
            event.stopPropagation();
            const examiner = examiners.find(e => e.id === examinerId);
            if (!examiner) return;
            
            examiner.disabled = !examiner.disabled;
            
            if (examiner.disabled && examiner.assigned) {
                examRooms.forEach(room => {
                    const idx = room.examiners.indexOf(examinerId);
                    if (idx !== -1) room.examiners[idx] = null;
                });
                examiner.assigned = false;
                examiner.assignedRoom = null;
            }
            
            refreshAllUI();
        }
        
        function getExaminerById(id) {
            return examiners.find(e => e.id === id);
        }
        
        function initExamTable(count) {
            examRooms = [];
            examTableBody.innerHTML = '';
            
            for (let i = 1; i <= count; i++) {
                const room = { id: i, examiners: [null, null, null] };
                examRooms.push(room);
                
                const row = document.createElement('tr');
                row.setAttribute('data-room-id', i);
                row.setAttribute('ondragover', 'allowRowDrop(event)');
                row.setAttribute('ondrop', 'dropRow(event)');
                
                const roomCell = document.createElement('td');
                roomCell.className = 'col-room';
                roomCell.textContent = i;
                roomCell.setAttribute('draggable', 'true');
                roomCell.setAttribute('ondragstart', 'dragRoomStart(event)');
                row.appendChild(roomCell);
                
                const countCell = document.createElement('td');
                countCell.className = 'col-count';
                countCell.innerHTML = subjectCounts[i] || '-';
                countCell.setAttribute('draggable', 'true');
                countCell.setAttribute('ondragstart', 'dragRoomStart(event)');
                row.appendChild(countCell);
                
                for (let j = 0; j < 3; j++) {
                    const teacherCell = document.createElement('td');
                    teacherCell.className = 'col-teacher';
                    const dz = document.createElement('div');
                    dz.className = 'teacher-drop-zone empty';
                    dz.setAttribute('ondrop', 'dropExaminer(event)');
                    dz.setAttribute('ondragover', 'allowDrop(event)');
                    dz.setAttribute('data-room-id', i);
                    dz.setAttribute('data-slot-index', j);
                    dz.textContent = '拖拽考官到此';
                    teacherCell.appendChild(dz);
                    row.appendChild(teacherCell);
                    
                    const subjectCell = document.createElement('td');
                    subjectCell.className = 'col-subject';
                    subjectCell.textContent = '-';
                    row.appendChild(subjectCell);
                }
                
                examTableBody.appendChild(row);
            }
            
            currentRoomCount = count;
        }
        
        function updateExamTable() {
            examRooms.forEach(room => {
                const row = document.querySelector(`tr[data-room-id="${room.id}"]`);
                if (!row) return;
                
                row.cells[1].innerHTML = subjectCounts[room.id] || '-';
                
                for (let i = 0; i < 3; i++) {
                    const examinerId = room.examiners[i];
                    const dz = row.cells[2 + i * 2].querySelector('.teacher-drop-zone');
                    const subjectCell = row.cells[3 + i * 2];
                    
                    if (examinerId) {
                        const examiner = getExaminerById(examinerId);
                        dz.className = 'teacher-drop-zone filled';
                        dz.setAttribute('draggable', 'true');
                        dz.setAttribute('ondragstart', 'dragExaminerStart(event)');
                        dz.setAttribute('data-examiner-id', examinerId);
                        dz.innerHTML = `
                            <div class="teacher-info">
                                <div class="teacher-name">${examiner.name}</div>
                                <div class="teacher-school">${examiner.school}</div>
                            </div>
                            <button class="teacher-delete-btn" onclick="deleteExaminerFromCell(event, this)">×</button>
                        `;
                        subjectCell.textContent = examiner.subject;
                    } else {
                        dz.className = 'teacher-drop-zone empty';
                        dz.removeAttribute('draggable');
                        dz.removeAttribute('data-examiner-id');
                        dz.innerHTML = '拖拽考官到此';
                        subjectCell.textContent = '-';
                    }
                }
            });
            
            markDataModified();
        }
        
        function deleteExaminerFromCell(event, btn) {
            event.stopPropagation();
            const id = parseInt(btn.getAttribute('data-examiner-id'));
            if (!id) return;
            
            if (confirm('确定要删除此考官吗？')) {
                examRooms.forEach(room => {
                    const idx = room.examiners.indexOf(id);
                    if (idx !== -1) room.examiners[idx] = null;
                });
                
                const examiner = getExaminerById(id);
                if (examiner) {
                    examiner.assigned = false;
                    examiner.assignedRoom = null;
                }
                
                refreshAllUI();
            }
        }
        
        function clearAllAssignments() {
            if (!confirm('确定要清空所有考场的编排吗？此操作不可撤销。')) return;
            
            examRooms.forEach(room => room.examiners.fill(null));
            examiners.forEach(e => { e.assigned = false; e.assignedRoom = null; });
            
            refreshAllUI();
        }
        
        function clearExaminers() {
            if (examiners.length === 0) return alert('考官信息库已为空！');
            if (!confirm('确定要清空所有考官信息吗？')) return;
            
            examiners = [];
            nextExaminerId = 1;
            examRooms.forEach(room => room.examiners.fill(null));
            
            updateAreaFilter();
            updateSchoolFilter();
            refreshAllUI();
            
            alert('考官信息库已清空！');
        }
        
        function clearSubjectCounts() {
            if (Object.keys(subjectCounts).length === 0) return alert('学科人数已为空！');
            if (!confirm('确定要清空学科人数吗？')) return;
            
            subjectCounts = {};
            updateExamTable();
            alert('学科人数已清空！');
        }
        
        function backupData() {
            const data = {
                examiners,
                examRooms,
                subjectCounts,
                backupTime: new Date().toLocaleString('zh-CN')
            };
            lastBackupData = data;
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `考官编排备份_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            alert('数据备份成功！');
        }
        
        function restoreBackupData() {
            if (!lastBackupData) {
                if (confirm('没有找到内存备份，是否从文件还原？')) fileInputRestore.click();
                return;
            }
            if (confirm('确定要还原备份吗？当前修改将丢失。')) {
                restoreDataFromObject(lastBackupData);
                alert('还原成功！');
            }
        }
        
        function restoreBackupFromFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    restoreDataFromObject(JSON.parse(e.target.result));
                    alert('文件还原成功！');
                } catch {
                    alert('文件格式错误');
                }
            };
            reader.readAsText(file);
        }
        
        function restoreDataFromObject(data) {
            examiners = data.examiners || [];
            examRooms = data.examRooms || [];
            subjectCounts = data.subjectCounts || {};
            
            if (examiners.length) {
                nextExaminerId = Math.max(...examiners.map(e => e.id)) + 1;
            }
            
            updateAreaFilter();
            updateSchoolFilter();
            refreshAllUI();
            
            if (examRooms.length) {
                currentRoomCount = examRooms.length;
                roomCountInput.value = currentRoomCount;
                rebuildExamTable();
            } else {
                initExamTable(currentRoomCount);
            }
            
            isDataModified = false;
        }
        
        function dragExaminerStart(event) {
            const t = event.target.classList.contains('teacher-drop-zone') ? event.target : event.target.closest('.teacher-drop-zone, .examiner-item');
            if (!t) return;
            
            const id = t.getAttribute('data-id') || t.getAttribute('data-examiner-id');
            if (!id) return;
            
            const examiner = getExaminerById(+id);
            if (examiner?.disabled) {
                event.preventDefault();
                return;
            }
            
            event.dataTransfer.setData('examinerId', id);
            event.dataTransfer.setData('dragType', 'examiner');
            
            if (t.classList.contains('teacher-drop-zone')) {
                event.dataTransfer.setData('sourceRoomId', t.getAttribute('data-room-id'));
                event.dataTransfer.setData('sourceSlotIndex', t.getAttribute('data-slot-index'));
            }
            
            t.classList.add('dragging');
        }
        
        function dragRoomStart(event) {
            const cell = event.target;
            if (!cell.classList.contains('col-room') && !cell.classList.contains('col-count')) return;
            
            const row = cell.closest('tr');
            if (row) {
                event.dataTransfer.setData('roomId', row.getAttribute('data-room-id'));
                event.dataTransfer.setData('dragType', 'room');
                row.style.opacity = '0.5';
            }
        }
        
        function allowDrop(event) {
            event.preventDefault();
            const dz = event.target.closest('.teacher-drop-zone');
            if (dz) dz.classList.add('drop-zone-hover');
        }
        
        function allowRowDrop(event) {
            event.preventDefault();
            if (event.dataTransfer.getData('dragType') === 'room') {
                const row = event.target.closest('tr');
                if (row) row.classList.add('row-drop-zone-hover');
            }
        }
        
        function removeHoverEffects() {
            document.querySelectorAll('.drop-zone-hover').forEach(e => e.classList.remove('drop-zone-hover'));
            document.querySelectorAll('.row-drop-zone-hover').forEach(e => e.classList.remove('row-drop-zone-hover'));
            document.querySelectorAll('#exam-table-body tr').forEach(r => r.style.opacity = '');
            document.querySelectorAll('.dragging').forEach(e => e.classList.remove('dragging'));
        }
        
        function dropExaminer(event) {
            event.preventDefault();
            removeHoverEffects();
            
            const dz = event.target.closest('.teacher-drop-zone');
            if (!dz) return;
            
            const examinerId = +event.dataTransfer.getData('examinerId');
            const dragType = event.dataTransfer.getData('dragType');
            if (dragType !== 'examiner' || !examinerId) return;
            
            const targetRoomId = +dz.getAttribute('data-room-id');
            const targetSlot = +dz.getAttribute('data-slot-index');
            const examiner = getExaminerById(examinerId);
            if (!examiner || examiner.disabled) return;
            
            const targetRoom = examRooms.find(r => r.id === targetRoomId);
            if (!targetRoom) return;
            
            const srcRoomId = +event.dataTransfer.getData('sourceRoomId');
            const srcSlot = +event.dataTransfer.getData('sourceSlotIndex');
            
            if (isNaN(srcRoomId)) {
                examRooms.forEach(r => {
                    const idx = r.examiners.indexOf(examinerId);
                    if (idx !== -1) r.examiners[idx] = null;
                });
            } else {
                const srcRoom = examRooms.find(r => r.id === srcRoomId);
                if (srcRoom) {
                    const otherId = targetRoom.examiners[targetSlot];
                    srcRoom.examiners[srcSlot] = otherId;
                    if (otherId) {
                        const other = getExaminerById(otherId);
                        if (other) other.assignedRoom = srcRoomId;
                    }
                }
            }
            
            targetRoom.examiners[targetSlot] = examinerId;
            examiner.assigned = true;
            examiner.assignedRoom = targetRoomId;
            
            refreshAllUI();
        }
        
        function dropRow(event) {
            event.preventDefault();
            removeHoverEffects();
            
            const targetRow = event.target.closest('tr');
            if (!targetRow || event.dataTransfer.getData('dragType') !== 'room') return;
            
            const srcId = +event.dataTransfer.getData('roomId');
            const tgtId = +targetRow.getAttribute('data-room-id');
            if (!srcId || srcId === tgtId) return;
            
            const srcIdx = examRooms.findIndex(r => r.id === srcId);
            const tgtIdx = examRooms.findIndex(r => r.id === tgtId);
            if (srcIdx === -1 || tgtIdx === -1) return;
            
            [examRooms[srcIdx], examRooms[tgtIdx]] = [examRooms[tgtIdx], examRooms[srcIdx]];
            [subjectCounts[srcId], subjectCounts[tgtId]] = [subjectCounts[tgtId], subjectCounts[srcId]];
            
            rebuildExamTable();
            updateAllAssignedRoomNumbers();
            markDataModified();
        }
        
        function updateAllAssignedRoomNumbers() {
            examiners.forEach(e => e.assignedRoom = findExaminerRoom(e.id));
            updateExaminerList();
        }
        
        function rebuildExamTable() {
            examRooms.sort((a, b) => a.id - b.id);
            examTableBody.innerHTML = '';
            
            examRooms.forEach(room => {
                const row = document.createElement('tr');
                row.setAttribute('data-room-id', room.id);
                row.setAttribute('ondragover', 'allowRowDrop(event)');
                row.setAttribute('ondrop', 'dropRow(event)');
                
                const roomCell = document.createElement('td');
                roomCell.className = 'col-room';
                roomCell.textContent = room.id;
                roomCell.setAttribute('draggable', 'true');
                roomCell.setAttribute('ondragstart', 'dragRoomStart(event)');
                row.appendChild(roomCell);
                
                const countCell = document.createElement('td');
                countCell.className = 'col-count';
                countCell.innerHTML = subjectCounts[room.id] || '-';
                countCell.setAttribute('draggable', 'true');
                countCell.setAttribute('ondragstart', 'dragRoomStart(event)');
                row.appendChild(countCell);
                
                for (let j = 0; j < 3; j++) {
                    const tc = document.createElement('td');
                    tc.className = 'col-teacher';
                    const dz = document.createElement('div');
                    dz.className = 'teacher-drop-zone empty';
                    dz.setAttribute('ondrop', 'dropExaminer(event)');
                    dz.setAttribute('ondragover', 'allowDrop(event)');
                    dz.setAttribute('data-room-id', room.id);
                    dz.setAttribute('data-slot-index', j);
                    dz.textContent = '拖拽考官到此';
                    tc.appendChild(dz);
                    row.appendChild(tc);
                    
                    const sc = document.createElement('td');
                    sc.className = 'col-subject';
                    sc.textContent = '-';
                    row.appendChild(sc);
                }
                
                examTableBody.appendChild(row);
            });
            
            updateExamTable();
        }
        
        function markDataModified() {
            isDataModified = true;
            if (autoSaveEnabled) {
                autoSaveDot.classList.remove('inactive');
                autoSaveText.textContent = '数据已修改，自动保存中...';
                clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(() => {
                    saveToLocalStorage();
                    isDataModified = false;
                    autoSaveText.textContent = '已自动保存';
                    setTimeout(() => autoSaveText.textContent = '自动保存已启用', 2000);
                }, 5000);
            }
        }
        
        function saveToLocalStorage() {
            if (!autoSaveEnabled) return;
            try {
                localStorage.setItem('examinerArrangementData', JSON.stringify({
                    examiners,
                    examRooms,
                    subjectCounts,
                    saveTime: new Date().toISOString()
                }));
            } catch {}
        }
        
        function loadFromLocalStorage() {
            try {
                const d = JSON.parse(localStorage.getItem('examinerArrangementData'));
                if (d) {
                    restoreDataFromObject(d);
                    return true;
                }
            } catch {}
            return false;
        }
        
        function showExportPreview() {
            if (!examiners.length) return alert('请先导入考官数据！');
            
            let html = `<h4>预览格式：CSV</h4>
                <div style="overflow:auto;max-height:400px;">
                <table style="width:100%;border-collapse:collapse;font-size:12px;">
                <thead><tr style="background:#f2f2f2;">
                <th style="border:1px solid #ddd;padding:5px;">考场号</th>
                <th style="border:1px solid #ddd;padding:5px;">学科人数</th>
                <th style="border:1px solid #ddd;padding:5px;">教师姓名1</th>
                <th style="border:1px solid #ddd;padding:5px;">学科1</th>
                <th style="border:1px solid #ddd;padding:5px;">教师姓名2</th>
                <th style="border:1px solid #ddd;padding:5px;">学科2</th>
                <th style="border:1px solid #ddd;padding:5px;">教师姓名3</th>
                <th style="border:1px solid #ddd;padding:5px;">学科3</th>
                </tr></thead><tbody>`;
            
            examRooms.forEach(room => {
                html += `<tr><td style="border:1px solid #ddd;padding:5px;">${room.id}</td>
                    <td style="border:1px solid #ddd;padding:5px;">${subjectCounts[room.id]?.replace(/<br>/g,' ') || '-'}</td>`;
                
                for (let i = 0; i < 3; i++) {
                    const e = getExaminerById(room.examiners[i]);
                    html += `<td style="border:1px solid #ddd;padding:5px;">${e ? e.name : '-'}</td>
                        <td style="border:1px solid #ddd;padding:5px;">${e ? e.subject : '-'}</td>`;
                }
                
                html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            previewContent.innerHTML = html;
            previewModal.style.display = 'flex';
        }
        
        function exportToCSV() {
            if (!examiners.length) return alert('请先导入考官数据！');
            
            let csv = '\uFEFF考场号,学科人数,教师姓名1,学科1,教师姓名2,学科2,教师姓名3,学科3\n';
            
            examRooms.forEach(room => {
                const row = [room.id, subjectCounts[room.id]?.replace(/<br>/g,' ') || '-'];
                for (let i = 0; i < 3; i++) {
                    const e = getExaminerById(room.examiners[i]);
                    row.push(e ? `"${e.name}"` : '-');
                    row.push(e ? `"${e.subject}"` : '-');
                }
                csv += row.join(',') + '\n';
            });
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
            a.download = `考官编排表_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            alert('导出成功！');
        }
        
        function exportToXLSX() {
            exportToCSV();
            alert('XLSX 暂用 CSV 替代，如需 XLSX 可集成 SheetJS。');
        }
        
        function exportToTXT() {
            if (!examiners.length) return alert('请先导入考官数据！');
            
            let txt = '考场号\t学科人数\t教师姓名1\t学科1\t教师姓名2\t学科2\t教师姓名3\t学科3\n';
            
            examRooms.forEach(room => {
                const row = [room.id, subjectCounts[room.id]?.replace(/<br>/g,' ') || '-'];
                for (let i = 0; i < 3; i++) {
                    const e = getExaminerById(room.examiners[i]);
                    row.push(e ? e.name : '-');
                    row.push(e ? e.subject : '-');
                }
                txt += row.join('\t') + '\n';
            });
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
            a.download = `考官编排表_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            alert('导出成功！');
        }
        
        function handleExaminerFileImport(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const newExaminers = parseExaminerFile(e.target.result);
                if (newExaminers.length) {
                    examiners = newExaminers;
                    nextExaminerId = examiners.length + 1;
                    examRooms.forEach(r => r.examiners.fill(null));
                    updateAreaFilter();
                    updateSchoolFilter();
                    refreshAllUI();
                    alert(`成功导入 ${examiners.length} 位考官！`);
                } else {
                    alert('未能解析考官文件，请检查格式。');
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function handleSubjectCountsFileImport(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const counts = parseSubjectCountsFile(e.target.result);
                if (Object.keys(counts).length) {
                    subjectCounts = counts;
                    const max = Math.max(...Object.keys(counts).map(Number));
                    if (currentRoomCount < max && confirm(`检测到 ${max} 个考场，是否更新？`)) {
                        roomCountInput.value = max;
                        initExamTable(max);
                    }
                    updateExamTable();
                    alert('学科人数导入成功！');
                } else {
                    alert('未能解析学科人数文件。');
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        // ===== 事件绑定 =====
        importExaminersBtn.onclick = () => fileInputExaminers.click();
        importSubjectCountsBtn.onclick = () => fileInputSubjectCounts.click();
        
        fileInputExaminers.onchange = e => { if (e.target.files[0]) handleExaminerFileImport(e.target.files[0]); e.target.value = ''; };
        fileInputSubjectCounts.onchange = e => { if (e.target.files[0]) handleSubjectCountsFileImport(e.target.files[0]); e.target.value = ''; };
        fileInputRestore.onchange = e => { if (e.target.files[0]) restoreBackupFromFile(e.target.files[0]); e.target.value = ''; };
        
        backupDataBtn.onclick = backupData;
        restoreDataBtn.onclick = restoreBackupData;
        clearExaminersBtn.onclick = clearExaminers;
        clearSubjectCountsBtn.onclick = clearSubjectCounts;
        exportCsvBtn.onclick = exportToCSV;
        exportXlsxBtn.onclick = exportToXLSX;
        exportTxtBtn.onclick = exportToTXT;
        previewExportBtn.onclick = showExportPreview;
        clearAllBtn.onclick = clearAllAssignments;
        closePreviewBtn.onclick = () => previewModal.style.display = 'none';
        previewModal.onclick = e => { if (e.target === previewModal) previewModal.style.display = 'none'; };
        
        updateRoomsBtn.onclick = () => {
            const c = +roomCountInput.value || 68;
            if (c < 1 || c > 100) return alert('考场数量需在 1–100 之间');
            initExamTable(c);
        };
        
        // ✅ 已删除：subjectFilter.onchange
        nameSearch.oninput = updateExaminerList;
        hideAssignedCheckbox.onchange = updateExaminerList;
        areaFilter.onchange = updateAssignedExaminerList;
        schoolFilter.onchange = updateAssignedExaminerList;
        subjectKeywordSearch.oninput = updateExaminerList;
        
        document.addEventListener('dragover', e => {
            if (e.target.closest('.teacher-drop-zone')) allowDrop(e);
            if (e.target.closest('tr')) allowRowDrop(e);
        });
        
        document.addEventListener('dragleave', removeHoverEffects);
        document.addEventListener('dragend', removeHoverEffects);
        
        autoSaveStatus.onclick = () => {
            autoSaveEnabled = !autoSaveEnabled;
            autoSaveDot.classList.toggle('inactive', !autoSaveEnabled);
            autoSaveText.textContent = autoSaveEnabled ? '自动保存已启用' : '自动保存已禁用';
        };
        
        window.addEventListener('beforeunload', () => {
            if (isDataModified) saveToLocalStorage();
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!loadFromLocalStorage()) {
                initExamTable(currentRoomCount);
            }
            refreshAllUI();
        });
    </script>
</body>
</html>
